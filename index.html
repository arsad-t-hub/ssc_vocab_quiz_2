<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Level Vocabulary Quiz - Randomized Fill in the Blanks</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --neutral-bg: #f8fafc;
            --text-main: #1e293b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--neutral-bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .quiz-container {
            width: 100%;
            max-width: 750px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        h1 { font-size: 1.6rem; margin-top: 0; text-align: center; color: #0f172a; border-bottom: 2px solid #e2e8f0; padding-bottom: 12px;}
        .progress { font-size: 0.95rem; color: #64748b; margin-bottom: 15px; font-weight: 500; }
        .sentence { font-size: 1.15rem; font-weight: 500; margin-bottom: 25px; line-height: 1.7; background: #f1f5f9; padding: 20px; border-radius: 8px; border-left: 5px solid var(--primary); }
        .blank { font-weight: 700; color: #ff0000; text-decoration: underline; background: #fef08a; padding: 2px 6px; border-radius: 4px; }
        .options-list { display: flex; flex-direction: column; gap: 14px; }
        .option-card { border: 2px solid #e2e8f0; border-radius: 8px; padding: 15px; cursor: pointer; transition: all 0.2s ease; position: relative; }
        .option-card:hover { border-color: #cbd5e1; background: #fafafa; }
        .option-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; color: #334155; }
        .details { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #cbd5e1; font-size: 0.9rem; color: #475569; line-height: 1.5; }
        
        /* Interactive States */
        .correct { border-color: var(--success) !important; background-color: #f0fdf4; }
        .correct .option-text { color: var(--success); }
        .wrong { border-color: var(--danger) !important; background-color: #fef2f2; }
        .wrong .option-text { color: var(--danger); }
        .disabled { pointer-events: none; }
        
        .controls { display: flex; justify-content: flex-end; margin-top: 25px; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 24px; font-size: 1rem; border-radius: 6px; cursor: pointer; display: none; font-weight: 600; box-shadow: 0 2px 4px rgba(37,99,235,0.2); }
        .btn:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>SSC CGL / CHSL Vocabulary Masterclass</h1>
    <div class="progress">Question <span id="current-idx">1</span> of <span id="total-idx">67</span></div>
    <div class="sentence" id="sentence-box">Loading question...</div>
    <div class="options-list" id="options-box"></div>
    <div class="controls">
        <button class="btn" id="next-btn" onclick="nextQuestion()">Next Question &rarr;</button>
    </div>
</div>

<script>
// Dataset containing expanded context questions derived from "27_&_28.0602026_2.pdf"
const vocabData = [
    { word: "Pragmatic", pos: "Adj.", meaning: "Practical", synonyms: "Realistic, Sensible", sentence: "Instead of wasting state resources on idealistic but unachievable schemes, the committee adopted a ________ approach to tackle urban unemployment directly." },
    { word: "Alleviate", pos: "Verb", meaning: "Reduce severity", synonyms: "Ease, Mitigate", sentence: "The newly introduced economic reforms and targeted subsidies are expected to significantly ________ the widespread poverty plaguing the rural sectors." },
    { word: "Ambiguous", pos: "Adj.", meaning: "Unclear", synonyms: "Vague", sentence: "Because the official legal notice issued by the municipal corporation was completely ________, citizens found themselves deeply confused about the compliance deadline." },
    { word: "Arbitrary", pos: "Adj.", meaning: "Random", synonyms: "Capricious", sentence: "Critics strongly condemned the management's decision as purely ________, claiming it lacked any reasoned logic or standard administrative parameters." },
    { word: "Audacious", pos: "Adj.", meaning: "Bold", synonyms: "Daring", sentence: "The young entrepreneur executed an ________ reform within the conventional tech industry, risking his entire capital on an unproven structural model." },

    { word: "Catalyst", pos: "Noun", meaning: "Agent of change", synonyms: "Trigger", sentence: "Economists argue that the introduction of high-speed internet technology acted as a vital ________, accelerating growth across multiple industries." },

    { word: "Concede", pos: "Verb", meaning: "Admit", synonyms: "Acknowledge", sentence: "Faced with overwhelming empirical data and an unassailable lead by his opponent, the candidate finally ________ defeat late last night." },
    { word: "Consolidate", pos: "Verb", meaning: "Strengthen", synonyms: "Fortify", sentence: "In a strategic move to secure market dominance, the major public sector banks ________ their operations into a single massive unified system." },
    { word: "Credible", pos: "Adj.", meaning: "Believable", synonyms: "Reliable", sentence: "The intelligence agency confirmed that the investigative report is fully ________, as it relies strictly on verified documentary proof." },
    { word: "Curb", pos: "Verb", meaning: "Control", synonyms: "Restrain", sentence: "The Central Bank introduced aggressive monetary tightening measures specifically designed to ________ spiraling inflation and stabilize currency value." },
    { word: "Deplete", pos: "Verb", meaning: "Use up", synonyms: "Drain", sentence: "Unregulated industrial exploitation has severely ________ the region's natural groundwater reserves, leading to a critical ecological crisis." },
    { word: "Deterrent", pos: "Noun", meaning: "Preventive", synonyms: "Check", sentence: "Legal scholars believe that imposing heavy financial penalties will act as an effective ________ against corporate environmental violations." },
    { word: "Disseminate", pos: "Verb", meaning: "Spread", synonyms: "Circulate", sentence: "Public health departments utilized broadcasting networks and social media platforms to quickly ________ emergency guidelines regarding the outbreak." },
    { word: "Empirical", pos: "Adj.", meaning: "Observation-based", synonyms: "Experimental", sentence: "The scientific community rejected the theoretical proposal because it lacked solid ________ evidence obtained through structured laboratory trials." },
    { word: "Endorse", pos: "Verb", meaning: "Approve", synonyms: "Support", sentence: "After reviewing the technical data, a panel of independent healthcare experts unanimously ________ the safety and efficacy of the new vaccine." },
    { word: "Escalate", pos: "Verb", meaning: "Increase", synonyms: "Intensify", sentence: "What began as a localized diplomatic misunderstanding threatened to ________ rapidly into a full-scale geopolitical confrontation." },
    { word: "Explicit", pos: "Adj.", meaning: "Clear", synonyms: "Definite", sentence: "The operational guidelines for the security personnel are absolutely ________, leaving no room for misinterpretation during crisis scenarios." },
    { word: "Feasible", pos: "Adj.", meaning: "Practical", synonyms: "Viable", sentence: "Engineers confirmed that constructing a solar plant over the canal is highly ________ and cost-effective given the geographic parameters." },
    { word: "Foster", pos: "Verb", meaning: "Encourage", synonyms: "Promote", sentence: "The primary objective of specialized creative workshops is to ________ latent artistic talent among young underprivileged students." },
    { word: "Imminent", pos: "Adj.", meaning: "About to happen", synonyms: "Impending", sentence: "Dark clouds covered the horizon and birds flew back to their nests, signaling that a severe thunderstorm was ________." },

    { word: "Mitigate", pos: "Verb", meaning: "Lessen", synonyms: "Reduce", sentence: "The disaster management agency initiated canal-dredging procedures to ________ the potential damage caused by the seasonal drought." },
    { word: "Opaque", pos: "Adj.", meaning: "Unclear", synonyms: "Obscure", sentence: "The government's decision-making process was criticized for being highly ________, rendering it impossible for public watchdog groups to track expenditure." },
    { word: "Pervasive", pos: "Adj.", meaning: "Widespread", synonyms: "Extensive", sentence: "Independent journalists exposed the ________ corruption deeply embedded within the administrative tiers of the regional department." },
    { word: "Plausible", pos: "Adj.", meaning: "Believable", synonyms: "Convincing", sentence: "Although his alibi sounded highly unusual at first, subsequent forensic analysis proved it was a completely ________ explanation." },
    { word: "Prudent", pos: "Adj.", meaning: "Wise", synonyms: "Sensible", sentence: "During periods of intense market volatility, it is financially ________ to diversify your investment portfolio rather than risking capital on a single stock." },
    { word: "Resilient", pos: "Adj.", meaning: "Able to recover", synonyms: "Hardy", sentence: "Demonstrating how remarkably ________ it is against external macroeconomic shocks, the domestic economy recovered swiftly within two quarters." },
    { word: "Scrutiny", pos: "Noun", meaning: "Close examination", synonyms: "Inspection", sentence: "Following allegations of insider trading, the financial accounts of the conglomerate were placed under intense regulatory ________." },
    { word: "Stringent", pos: "Adj.", meaning: "Strict", synonyms: "Rigorous", sentence: "To prevent cross-contamination, the pharmaceutical manufacturing facility enforces exceptionally ________ quality control norms." },
    { word: "Substantiate", pos: "Verb", meaning: "Prove", synonyms: "Verify", sentence: "The prosecutor brought forward physical evidence and corroborating eyewitness accounts to ________ the charges leveled against the accused." },
    { word: "Vigilant", pos: "Adj.", meaning: "Watchful", synonyms: "Alert", sentence: "Border security forces have been ordered to remain exceptionally ________ along the perimeter to intercept any unauthorized entry attempts." },
    { word: "Viable", pos: "Adj.", meaning: "Capable / Practical", synonyms: "Practical, Usable", sentence: "Faced with dwindling conventional fuel reserves, switching to hybrid electric engines became the only commercially ________ option left." },
    { word: "Abate", pos: "Verb", meaning: "Become less", synonyms: "Subside", sentence: "Economists project that with a bumper harvest expected in the coming quarter, food supply pressures and overall inflation may finally ________." },
    { word: "Accentuate", pos: "Verb", meaning: "Emphasize", synonyms: "Highlight", sentence: "The international audit report explicitly ________ the systematic structural issues that are hindering the agency's operational efficiency." },
    { word: "Adversarial", pos: "Adj.", meaning: "Hostile", synonyms: "Combative", sentence: "The courtroom debate took on an intensely ________ tone as both legal counsels aggressively cross-examined the prime witnesses." },
    { word: "Ambit", pos: "Noun", meaning: "Scope", synonyms: "Sphere", sentence: "The newly enacted consumer protection legislation brings e-commerce platforms directly within the ________ of regulatory oversight." },
    { word: "Bolster", pos: "Verb", meaning: "Strengthen", synonyms: "Reinforce", sentence: "The injection of emergency capital by institutional investors served to ________ consumer confidence and stabilize the stock prices." },
    { word: "Candid", pos: "Adj.", meaning: "Frank", synonyms: "Sincere", sentence: "In a remarkably ________ reply during the press briefing, the minister admitted that the department had misjudged the project's timeline." },
    { word: "Cohesion", pos: "Noun", meaning: "Unity", synonyms: "Harmony", sentence: "Community leaders organized cross-cultural festivals to promote social ________ and eliminate prevailing historical misunderstandings." },
    { word: "Curtail", pos: "Verb", meaning: "Reduce", synonyms: "Restrict", sentence: "The government decided to severely ________ non-essential public spending to allocate more funds toward emergency healthcare infrastructure." },
    { word: "Deliberate", pos: "Verb", meaning: "Consider", synonyms: "Ponder", sentence: "The jury members took upwards of twelve hours to ________ carefully over the contradictory forensic evidence before reaching a verdict." },
    { word: "Deteriorate", pos: "Verb", meaning: "Become worse", synonyms: "Decline", sentence: "Due to prolonged administrative neglect and lack of funding, the structural conditions of the heritage site ________ rapidly." },
    { word: "Elusive", pos: "Adj.", meaning: "Hard to achieve", synonyms: "Fleeting", sentence: "Despite working day and night for several years, achieving commercial success remained completely ________ for the independent filmmaker." },
    { word: "Entail", pos: "Verb", meaning: "Involve", synonyms: "Require", sentence: "Implementing this advanced automated software architecture will inevitably ________ substantial long-term training costs for our workforce." },
    { word: "Equitable", pos: "Adj.", meaning: "Fair", synonyms: "Just", sentence: "The trade union demanded a more ________ distribution of the corporate profits through balanced wage increments and bonuses." },
    { word: "Expedite", pos: "Verb", meaning: "Speed up", synonyms: "Accelerate", sentence: "The prime minister issued a directive to ________ the administrative clearance work for all delayed highway infrastructure projects." },
    { word: "Fragile", pos: "Adj.", meaning: "Easily damaged", synonyms: "Delicate", sentence: "Analysts warned that the current economic recovery is incredibly ________ and could be disrupted by any sudden change in oil prices." },
    { word: "Galvanize", pos: "Verb", meaning: "Motivate", synonyms: "Inspire", sentence: "The emotional and passionate speech delivered by the activist served to ________ millions of voters across the nation." },
    { word: "Impasse", pos: "Noun", meaning: "Deadlock", synonyms: "Stalemate", sentence: "The diplomatic talks reached a complete ________ when neither nation agreed to compromise on the volatile border demarcation issue." },
    { word: "Incumbent", pos: "Adj.", meaning: "Obligatory", synonyms: "Mandatory", sentence: "It is strictly ________ upon all responsible citizens to verify facts before sharing sensitive political news on social platforms." },
    { word: "Indispensable", pos: "Adj.", meaning: "Essential", synonyms: "Crucial", sentence: "In modern analytical science, accurate collection of raw empirical data is absolutely ________ for producing reliable conclusions." },
    { word: "Inevitable", pos: "Adj.", meaning: "Certain", synonyms: "Unavoidable", sentence: "With rapid urbanization and population growth occurring everywhere, profound demographic changes are completely ________." },
    { word: "Inhibit", pos: "Verb", meaning: "Restrain", synonyms: "Hinder", sentence: "Financial experts point out that imposing excessively high corporate taxes will ultimately ________ industrial growth and innovation." },
    { word: "Lucid", pos: "Adj.", meaning: "Clear", synonyms: "Coherent", sentence: "The professor provided a remarkably ________ explanation of quantum mechanics, making it easy to comprehend even for beginners." },
    { word: "Magnify", pos: "Verb", meaning: "Increase", synonyms: "Amplify", sentence: "Unverified viral rumors on public forums tend to drastically ________ irrational fear among local communities during emergencies." },
    { word: "Meagre", pos: "Adj.", meaning: "Very small", synonyms: "Scant", sentence: "The project collapsed within months because the ________ financial support provided by the sponsors failed to cover basic logistical costs." },
    { word: "Peril",  pos: "Noun", meaning: "Danger", synonyms: "Hazard", sentence: "Navigating through treacherous deep-sea channels without an advanced radar system exposes the cargo ship to immense structural ________." },
    { word: "Reiterate", pos: "Verb", meaning: "Repeat", synonyms: "Restate", sentence: "During the annual general meeting, the managing director ________ his promise to turn the company fully carbon-neutral by next year." },
    { word: "Revamp", pos: "Verb", meaning: "Improve", synonyms: "Overhaul", sentence: "The education ministry established an expert panel to completely ________ the obsolete school syllabus and align it with global trends." },
    { word: "Skeptical", pos: "Adj.", meaning: "Doubtful", synonyms: "Wary", sentence: "Having witnessed several speculative market bubbles burst before, highly ________ investors approached the new asset class with extreme caution." },
    { word: "Sustainable", pos: "Adj.", meaning: "Longterm-", synonyms: "Enduring", sentence: "Environmental scientists advocate for green energy alternatives to guarantee clean, ________ development for future generations." },
    { word: "Tentative", pos: "Adj.", meaning: "Not final", synonyms: "Provisional", sentence: "The recruitment board released a ________ exam schedule, noting that dates might shift depending on administrative logistics." },
    { word: "Validate", pos: "Verb", meaning: "Confirm", synonyms: "Verify", sentence: "Independent peer reviews are strictly designed to ________ scientific research findings before publication in medical journals." },
    { word: "Wary", pos: "Adj.", meaning: "Cautious", synonyms: "Alert", sentence: "Given the high percentage of non-performing assets, commercial banks have become deeply ________ of lending to heavily leveraged startups." }
];

let currentIndex = 0;

// Fisher-Yates Shuffle algorithm to randomize questions completely on initialization
function shuffleQuestions(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function loadQuestion() {
    const currentItem = vocabData[currentIndex];
    document.getElementById("current-idx").innerText = currentIndex + 1;
    document.getElementById("total-idx").innerText = vocabData.length;
    document.getElementById("next-btn").style.display = "none";
    
    // Display long form sentence
    document.getElementById("sentence-box").innerHTML = currentItem.sentence;
    
    // Generate options pool (1 correct answer + 3 random ones)
    let options = [currentItem];
    while (options.length < 4) {
        let randItem = vocabData[Math.floor(Math.random() * vocabData.length)];
        if (!options.some(o => o.word === randItem.word)) {
            options.push(randItem);
        }
    }
    
    // Shuffle options array
    options.sort(() => Math.random() - 0.5);
    
    // Inject elements into DOM
    const optionsBox = document.getElementById("options-box");
    optionsBox.innerHTML = "";
    
    options.forEach(opt => {
        const card = document.createElement("div");
        card.className = "option-card";
        card.dataset.word = opt.word;
        
        card.innerHTML = `
            <div class="option-text">${opt.word} <span style="font-weight:normal; font-size:0.85rem; color:#64748b;">(${opt.pos})</span></div>
            <div class="details">
                <strong>Meaning:</strong> ${opt.meaning}<br>
                <strong>Synonyms:</strong> ${opt.synonyms}
            </div>
        `;
        
        card.onclick = () => selectOption(card, currentItem.word);
        optionsBox.appendChild(card);
    });
}

function selectOption(selectedCard, correctWord) {
    const cards = document.querySelectorAll(".option-card");
    const detailsBoxes = document.querySelectorAll(".details");
    
    cards.forEach(card => {
        card.classList.add("disabled");
        if (card.dataset.word === correctWord) {
            card.classList.add("correct");
        } else if (card === selectedCard) {
            card.classList.add("wrong");
        }
    });

    // Reveal full meaning and synonym data for every single option instantly
    detailsBoxes.forEach(detail => {
        detail.style.display = "block";
    });

    // Replace structural placeholder blank with actual formatted term
    const sentenceBox = document.getElementById("sentence-box");
    sentenceBox.innerHTML = sentenceBox.innerHTML.replace("________", `<span class="blank">${correctWord}</span>`);

    document.getElementById("next-btn").style.display = "block";
}

function nextQuestion() {
    currentIndex = (currentIndex + 1) % vocabData.length;
    loadQuestion();
}

// Initializing the script with a randomized master queue on load
window.onload = function() {
    shuffleQuestions(vocabData);
    loadQuestion();
};
</script>

</body>
</html>
