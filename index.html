<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Vocabulary Quiz - Fill in the Blanks</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --neutral-bg: #f8fafc;
            --text-main: #1e293b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--neutral-bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .quiz-container {
            width: 100%;
            max-width: 650px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        h1 { font-size: 1.5rem; margin-top: 0; text-align: center; color: #0f172a; }
        .progress { font-size: 0.9rem; color: #64748b; margin-bottom: 15px; }
        .sentence { font-size: 1.2rem; font-weight: 500; margin-bottom: 25px; line-height: 1.6; background: #f1f5f9; padding: 15px; border-radius: 8px; border-left: 4px solid var(--primary); }
        .blank { font-weight: 700; color: var(--primary); text-decoration: underline; }
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .option-card { border: 2px solid #e2e8f0; border-radius: 8px; padding: 15px; cursor: pointer; transition: all 0.2s ease; position: relative; }
        .option-card:hover { border-color: #cbd5e1; background: #fafafa; }
        .option-text { font-size: 1.05rem; font-weight: 600; margin-bottom: 4px; }
        .details { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #cbd5e1; font-size: 0.85rem; color: #475569; line-height: 1.4; }
        
        /* Selected States */
        .correct { border-color: var(--success) !important; background-color: #f0fdf4; }
        .correct .option-text { color: var(--success); }
        .wrong { border-color: var(--danger) !important; background-color: #fef2f2; }
        .wrong .option-text { color: var(--danger); }
        .disabled { pointer-events: none; }
        
        .controls { display: flex; justify-content: flex-end; margin-top: 25px; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; font-size: 1rem; border-radius: 6px; cursor: pointer; display: none; font-weight: 500; }
        .btn:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>SSC Vocabulary Practice</h1>
    <div class="progress">Question <span id="current-idx">1</span> of <span id="total-idx">67</span></div>
    <div class="sentence" id="sentence-box">Loading sentence...</div>
    <div class="options-list" id="options-box"></div>
    <div class="controls">
        <button class="btn" id="next-btn" onclick="nextQuestion()">Next Word &rarr;</button>
    </div>
</div>

<script>

    { word: "Deterrent", pos: "Noun", meaning: "Preventive", synonyms: "Check", original_example: "Laws act as deterrents." },
    { word: "Disseminate", pos: "Verb", meaning: "Spread", synonyms: "Circulate", original_example: "Disseminate information." },
    { word: "Empirical", pos: "Adj.", meaning: "Observation-based", synonyms: "Experimental", original_example: "Empirical evidence." },
    { word: "Endorse", pos: "Verb", meaning: "Approve", synonyms: "Support", original_example: "Experts endorsed it." },
    { word: "Escalate", pos: "Verb", meaning: "Increase", synonyms: "Intensify", original_example: "Conflict escalated." },
    { word: "Explicit", pos: "Adj.", meaning: "Clear", synonyms: "Definite", original_example: "Rules are explicit." },
    { word: "Feasible", pos: "Adj.", meaning: "Practical", synonyms: "Viable", original_example: "The plan is feasible." },
    { word: "Foster", pos: "Verb", meaning: "Encourage", synonyms: "Promote", original_example: "Schools foster talent." },

    { word: "Impartial", pos: "Adj.", meaning: "Fair", synonyms: "Neutral", original_example: "Remain impartial." },

    { word: "Plausible", pos: "Adj.", meaning: "Believable", synonyms: "Convincing", original_example: "A plausible answer." },
    { word: "Prudent", pos: "Adj.", meaning: "Wise", synonyms: "Sensible", original_example: "Be prudent." },
    { word: "Resilient", pos: "Adj.", meaning: "Able to recover", synonyms: "Hardy", original_example: "Economy resilient." },
    { word: "Scrutiny", pos: "Noun", meaning: "Close examination", synonyms: "Inspection", original_example: "Under scrutiny." },
    { word: "Stringent", pos: "Adj.", meaning: "Strict", synonyms: "Rigorous", original_example: "Stringent norms." },
    { word: "Substantiate", pos: "Verb", meaning: "Prove", synonyms: "Verify", original_example: "Substantiate claims." },
    { word: "Vigilant", pos: "Adj.", meaning: "Watchful", synonyms: "Alert", original_example: "Remain vigilant." },
    { word: "Viable", pos: "Adj.", meaning: "Capable / Practical", synonyms: "Practical, Usable", original_example: "A viable option." },

    { word: "Entail", pos: "Verb", meaning: "Involve", synonyms: "Require", original_example: "Policy entails costs." },
    { word: "Equitable", pos: "Adj.", meaning: "Fair", synonyms: "Just", original_example: "Equitable distribution." },
    { word: "Expedite", pos: "Verb", meaning: "Speed up", synonyms: "Accelerate", original_example: "Expedite work." },
    { word: "Fragile", pos: "Adj.", meaning: "Easily damaged", synonyms: "Delicate", original_example: "Recovery fragile." },
    { word: "Galvanize", pos: "Verb", meaning: "Motivate", synonyms: "Inspire", original_example: "Speech galvanized voters." },

    { word: "Incumbent", pos: "Adj.", meaning: "Obligatory", synonyms: "Mandatory", original_example: "Incumbent upon citizens." },
    { word: "Indispensable", pos: "Adj.", meaning: "Essential", synonyms: "Crucial", original_example: "Data indispensable." },
    { word: "Inevitable", pos: "Adj.", meaning: "Certain", synonyms: "Unavoidable", original_example: "Changes inevitable." },

    { word: "Lucid", pos: "Adj.", meaning: "Clear", synonyms: "Coherent", original_example: "Lucid explanation." },
    { word: "Magnify", pos: "Verb", meaning: "Increase", synonyms: "Amplify", original_example: "Rumours magnify fear." },
    { word: "Meagre", pos: "Adj.", meaning: "Very small", synonyms: "Scant", original_example: "Meagre support." },
    { word: "Peril",  pos: "Noun", meaning: "Danger", synonyms: "Hazard", original_example: "Faces peril." },
    { word: "Reiterate", pos: "Verb", meaning: "Repeat", synonyms: "Restate", original_example: "Reiterated promise." },
    { word: "Revamp", pos: "Verb", meaning: "Improve", synonyms: "Overhaul", original_example: "Revamp syllabus." },
    { word: "Skeptical", pos: "Adj.", meaning: "Doubtful", synonyms: "Wary", original_example: "Skeptical investors." },
    { word: "Sustainable", pos: "Adj.", meaning: "Longterm-", synonyms: "Enduring", original_example: "Sustainable growth." },
    { word: "Tentative", pos: "Adj.", meaning: "Not final", synonyms: "Provisional", original_example: "Tentative schedule." },
    { word: "Validate", pos: "Verb", meaning: "Confirm", synonyms: "Verify", original_example: "Validate findings." },
    { word: "Wary", pos: "Adj.", meaning: "Cautious", synonyms: "Alert", original_example: "Banks are wary." }
];

let currentIndex = 0;

// Utility to create a blank context sentence dynamically from original items
function makeSentence(item) {
    let regex = new RegExp(item.word, "gi");
    let formWithBlank = item.original_example.replace(regex, "______");
    // Handle specific variations or conjugations if applicable
    if(item.word === "Consolidate") formWithBlank = formWithBlank.replace(/consolidated/gi, "______");
    if(item.word === "Concede") formWithBlank = formWithBlank.replace(/conceded/gi, "______");
    if(item.word === "Escalate") formWithBlank = formWithBlank.replace(/escalated/gi, "______");
    if(item.word === "Endorse") formWithBlank = formWithBlank.replace(/endorsed/gi, "______");
    if(item.word === "Deplete") formWithBlank = formWithBlank.replace(/depleted/gi, "______");
    if(item.word === "Deterrent") formWithBlank = formWithBlank.replace(/deterrents/gi, "______");
    if(item.word === "Galvanize") formWithBlank = formWithBlank.replace(/galvanized/gi, "______");
    if(item.word === "Deteriorate") formWithBlank = formWithBlank.replace(/deteriorated/gi, "______");
    if(item.word === "Reiterate") formWithBlank = formWithBlank.replace(/reiterated/gi, "______");
    return formWithBlank;
}

function loadQuestion() {
    const currentItem = vocabData[currentIndex];
    document.getElementById("current-idx").innerText = currentIndex + 1;
    document.getElementById("total-idx").innerText = vocabData.length;
    document.getElementById("next-btn").style.display = "none";
    
    // Set sentence
    document.getElementById("sentence-box").innerHTML = makeSentence(currentItem);
    
    // Pick 3 random incorrect answers
    let options = [currentItem];
    while (options.length < 4) {
        let randItem = vocabData[Math.floor(Math.random() * vocabData.length)];
        if (!options.some(o => o.word === randItem.word)) {
            options.push(randItem);
        }
    }
    
    // Shuffle options
    options.sort(() => Math.random() - 0.5);
    
    // Generate markup
    const optionsBox = document.getElementById("options-box");
    optionsBox.innerHTML = "";
    
    options.forEach(opt => {
        const card = document.createElement("div");
        card.className = "option-card";
        card.dataset.word = opt.word;
        
        card.innerHTML = `
            <div class="option-text">${opt.word} <span style="font-weight:normal; font-size:0.85rem; color:#64748b;">(${opt.pos})</span></div>
            <div class="details">
                <strong>Meaning:</strong> ${opt.meaning}<br>
                <strong>Synonyms:</strong> ${opt.synonyms}
            </div>
        `;
        
        card.onclick = () => selectOption(card, currentItem.word);
        optionsBox.appendChild(card);
    });
}

function selectOption(selectedCard, correctWord) {
    const cards = document.querySelectorAll(".option-card");
    const detailsBoxes = document.querySelectorAll(".details");
    
    cards.forEach(card => {
        card.classList.add("disabled");
        // Highlight correct and incorrect configurations
        if (card.dataset.word === correctWord) {
            card.classList.add("correct");
        } else if (card === selectedCard) {
            card.classList.add("wrong");
        }
    });

    // Reveal ALL meanings and synonyms simultaneously after selection
    detailsBoxes.forEach(detail => {
        detail.style.display = "block";
    });

    // Swap blank line with real word answer
    const sentenceBox = document.getElementById("sentence-box");
    sentenceBox.innerHTML = sentenceBox.innerHTML.replace("______", `<span class="blank">${correctWord}</span>`);

    document.getElementById("next-btn").style.display = "block";
}

function nextQuestion() {
    currentIndex = (currentIndex + 1) % vocabData.length;
    loadQuestion();
}

// Start quiz on window load
window.onload = loadQuestion;
</script>

</body>
</html>
